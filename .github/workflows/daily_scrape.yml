name: Daily PSP Scrape

on:
  push:
    paths:
      - 'File2_Raw/**'
      - 'File3_Raw/**'
  workflow_dispatch:        # manual trigger from GitHub Actions tab
    inputs:
      date:
        description: 'Override data date (YYYY-MM-DD). Leave blank for auto (yesterday).'
        required: false
        default: ''
      scan:
        description: 'Parse all unparsed files already in File3_Raw (yes/no).'
        required: false
        default: 'no'

permissions:
  contents: write   # needed to commit updated CSVs back to repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pandas openpyxl pdfplumber requests urllib3 xlrd "kaggle>=1.8.0"

      # ── 4. Run scraper ─────────────────────────────────────────────────────
      - name: Run daily update
        id: scrape
        run: |
          if [ "${{ github.event.inputs.scan }}" = "yes" ] || [ "${{ github.event_name }}" = "push" ]; then
            python Scrapings/update_live.py --scan
          elif [ -n "${{ github.event.inputs.date }}" ]; then
            python Scrapings/update_live.py --date "${{ github.event.inputs.date }}"
          else
            python Scrapings/update_live.py
          fi
        # Exit 1 = not published yet (not a failure, just retry later)
        continue-on-error: true

      - name: Check scrape outcome
        id: outcome
        run: |
          if [ "${{ steps.scrape.outcome }}" = "failure" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Scrape exited with error — file not available yet or parse failed."
          else
            # Check if CSVs or raw folders changed
            git diff --quiet Dataset/study1_daily.csv Dataset/study2_scada.csv \
              && echo "changed=false" >> $GITHUB_OUTPUT \
              || echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ── 5. Commit raw file + updated CSVs ─────────────────────────────────
      - name: Commit and push
        if: steps.outcome.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dataset/study1_daily.csv Dataset/study2_scada.csv File2_Raw/ File3_Raw/
          git commit -m "chore: daily PSP update $(date -u +%Y-%m-%d)"
          git push

      # ── 6. Push updated datasets to Kaggle ────────────────────────────────
      - name: Push to Kaggle
        if: steps.outcome.outputs.changed == 'true'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          kaggle datasets version \
            -p Dataset/ \
            -m "Daily PSP update $(date -u +%Y-%m-%d)" \
            --dir-mode zip

      # ── 7. Summary ─────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.outcome.outputs.changed }}" = "true" ]; then
            echo "✅ CSVs updated and pushed to GitHub + Kaggle."
          else
            echo "ℹ️  No new data available yet — will retry at next scheduled run."
          fi
